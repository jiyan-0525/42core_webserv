# Configuration file for webserv
# Syntax inspired by NGINX

server {
	listen 8080;
	server_name localhost;
	client_max_body_size 10M;

	# Custom error pages
	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	# Root location — serves the static website
	location / {		root ./www;
		index index.html;
		methods GET;
		autoindex off;
	}

	# Enable directory listing on /files
	location /files {
		root ./www/files;
		methods GET;
		autoindex on;
	}

	# Upload endpoint
	location /upload {
		root ./www/uploads;
		methods GET POST DELETE;
		upload_dir ./uploads;
		client_max_body_size 5M;
	}

	# CGI support
	location /cgi-bin {
		root ./www/cgi-bin;
		methods GET POST;
		cgi_extension .py;
		cgi_path /usr/bin/python3;
	}
}

# You can define a second server on a different port
server {
	listen 8081;
	server_name example.com;

	location / {
		root ./www2;
		index index.html;
		methods GET POST DELETE;
		autoindex off;
	}
}
